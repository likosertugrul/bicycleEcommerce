  <text x="400" y="545" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="600" fill="#2c3e70" opacity="0.85">City Bike (Used)</text>
  <text x="400" y="580" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#2c3e70" opacity="0.55">Sample image</text>

    <circle cx="245" cy="380" r="105"/>
    <circle cx="555" cy="380" r="105"/>
    <circle cx="245" cy="380" r="14" fill="#2c3e70" stroke="none"/>
    <circle cx="555" cy="380" r="14" fill="#2c3e70" stroke="none"/>
